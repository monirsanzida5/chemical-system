<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Web site created using create-react-app" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>Chemical System - React App</title>

    <!-- 🌍 Google Translate Widget -->
    <script
      type="text/javascript"
      src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
    ></script>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: "en",
            includedLanguages: "bn,en,ja,zh",
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false
          },
          "google_translate_element"
        );
      }

      window.translateTo = function (langCode) {
        if (
          window.google &&
          window.google.translate &&
          document.getElementById("google_translate_element")
        ) {
          const selector = document.querySelector(".goog-te-combo");
          if (selector && selector.length) {
            for (let i = 0; i < selector.length; i++) {
              const opt = selector[i];
              if (opt && (opt.value === langCode || opt.value.includes(langCode))) {
                selector.selectedIndex = i;
                const evt = document.createEvent("HTMLEvents");
                evt.initEvent("change", true, true);
                selector.dispatchEvent(evt);
                break;
              }
            }
          }
        } else {
          // Google script এখনো না লোড হলে একটু দেরি করে আবার চালাবে
          setTimeout(() => window.translateTo(langCode), 500);
        }
      };
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
