<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>React App</title>

    <!-- 🌍 Google Translate Widget -->
    <script
      type="text/javascript"
      src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
    ></script>
    <script type="text/javascript">
      // Initialize Google Translate element that also powers your navbar dropdown
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: "en",
            includedLanguages: "bn,en,ja,zh",
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
            autoDisplay: false // UI dropdown মাঝখানে এসে না জমুক
          },
          "google_translate_element"
        );
      }

      // Navbar‑এর dropdown থেকে Google Translate চালানোর function
      window.translateTo = function (langCode) {
        if (
          window.google &&
          window.google.translate &&
          document.getElementById("google_translate_element")
        ) {
          // TranslateElement একবার init করলে Google চায়না সহকারে translate চালাবে
          const selector = document.querySelector(".goog-te-combo");
          if (selector) {
            for (let i = 0; i < selector.length; i++) {
              if (selector[i].value === langCode || selector[i].value.includes(langCode)) {
                selector[i].selected = true;
                // Trigger change event so Google applies the translation
                const evt = document.createEvent("HTMLEvents");
                evt.initEvent("change", true, true);
                selector.dispatchEvent(evt);
                break;
              }
            }
          }
        } else {
          // Google script load হয়নি হলে fallback message
          console.warn("Google Translate not loaded yet.");
        }
      };
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

  </body>
</html>
